apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: app-image-updater
  namespace: argocd
spec:
  commonUpdateSettings:
    updateStrategy: "semver"
    allowTags: "regexp:^[0-9]+.*"
  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      repository: https://github.com/rithik-sandron/devops.git
      branch: "main"
      writeBackTarget: "helmvalues:argocd/app/values.yml"
  applicationRefs:
    - namePattern: "app*"
      images:
        - alias: "app-prod"
          imageName: "rithiksandron/app"
