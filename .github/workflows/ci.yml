name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Ref = $GITHUB_REF"
      - run: echo "Event = $GITHUB_EVENT_NAME"
      - run: echo "workspace path = $GITHUB_WORKSPACE"
      - run: echo "run by = $GITHUB_ACTOR"

      - uses: actions/checkout@v4

      - id: version
        uses: ./.github/actions/composite/version

      - id: build
        uses: ./.github/actions/composite/build
        with:
          dockerfile: $GITHUB_WORKSPACE/app/Containerfile
          path: $GITHUB_WORKSPACE/app
          image-name: ${{ steps.version.outputs.app_with_tag }}

      - id: print
        run: echo "Image = ${{ steps.build.outputs.image }}"
