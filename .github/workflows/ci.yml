name: Running CI

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout Repo
        id: checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/composite
        id: ci

      - run: echo "Ref= ${{ steps.ci.outputs.ref }}"
      - run: echo "Init= ${{ steps.ci.outputs.init_result }}"
