name: "Docker Build Action"
description: "Build Action to build given dockerfile"

inputs:
  repo-token:
    description: "Github PA Token"
    required: false
    default: ${{ github.token }}

  dockerfile:
    description: "Path to the Dockerfile to build"
    required: false
    default: "Dockerfile"

  path:
    description: "Path to the shell script to run"
    required: true

  image-name:
    description: "Name of the Docker image to build"
    required: false
    default: "local"

runs:
  using: "composite"
  steps:
    - id: action-path
      shell: bash
      run: echo "Github Action path = $GITHUB_ACTION_PATH"

    - id: login-to-docker
      name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
        logout: true

    - id: build
      shell: bash
      run: |
        echo "Building Podman image using ${{ inputs.dockerfile }}"
        podman build --no-cache -t rithiksandron/${{ inputs.image-name }} -f ${{ inputs.dockerfile }} ${{ inputs.path }}
        podman push rithiksandron/${{ inputs.image-name }}
        echo "image=rithiksandron/${{ inputs.image-name }}" >> $GITHUB_OUTPUT

outputs:
  image:
    description: "image name with tag"
    value: ${{ steps.build.outputs.image }}
