apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: hello
          image: busybox:stable
          command: ["/bin/sh"]
          args: ["-c", "echo 'hello' && sleep 3600"]
