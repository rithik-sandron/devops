version: "3"

includes:
  terraform: ./Taskfile_terraform.yml

tasks:
  push:
    aliases: [p]
    desc: git add, commit, and push changes
    cmds:
      - git add -A
      - git commit -m "updates"
      - git push
  build:
    aliases: [p]
    desc: build image
    cmds:
      - podman build --no-cache -t app:1 -f app/Containerfile app
  run:
    aliases: [p]
    desc: run image
    cmds:
      - podman run -p 3000:3000 app:1
  work:
    desc: "Builds and runs the image"
    cmds:
      - task build
      - task run

  # Cluster
  # ------------------------------------------------------------------------------------------------
  cdeploy:
    desc: "Deploys argocd and apps to cluster"
    cmds:
      - task lstart
      - kubectl apply -k argocd/base --server-side --force-conflicts
      - kubectl apply -f argocd/sync

  ckind:
    desc: "Create kind cluster"
    cmds:
      - |
        export KIND_EXPERIMENTAL_PROVIDER=podman # use podman instead of docker
        kind create cluster --name k8s
        kubectl config use-context kind-k8s

  # Local
  # ------------------------------------------------------------------------------------------------
  install:
    desc: sets up task[taskfile], local cluster, and other tools this repo uses
    ignore_error: true
    cmds:
      - |
        brew install go-task # Task for takefile
        curl -fsSL https://bun.com/install | bash # install bun
        brew install act
        brew install gh
        brew install kubectl
        brew install podman
        brew install argocd
        brew install kind

  start:
    aliases: [st]
    desc: starts running podman machine and cluster
    ignore_error: true
    cmds:
      - |
        podman machine init
        podman machine start
        task ckind

  stop:
    aliases: [sp]
    desc: stops running podman machine
    cmds:
      - |
        export KIND_EXPERIMENTAL_PROVIDER=podman
        kind delete cluster --name k8s
        podman machine stop
